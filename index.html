<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D AR Viewer</title>
    <script type="module" crossorigin src="/ar-viewer/assets/index-B_1-Bssi.js"></script>
    <link rel="stylesheet" crossorigin href="/ar-viewer/assets/index-DH-Bd2j5.css">
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="hero-content">
          <p class="eyebrow">3D • Web • AR</p>
          <h1>Mijn 3D Modellen</h1>
          <p class="hero-text">
            Bekijk, kies en laad verschillende fotogrammetrie-modellen in één
            mooie viewer.
          </p>
          <button id="startBtn" class="primary-btn">Start viewer</button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <h2>Modellen</h2>
          <div id="modelList" class="model-list"></div>
        </aside>

        <section class="viewer-section">
          <div class="viewer-topbar">
            <div>
              <h2 id="modelTitle">Nog geen model geladen</h2>
              <p id="modelSubtitle">Kies een model uit de lijst</p>
            </div>

            <div class="topbar-actions">
              <input
                id="modelUrlInput"
                type="text"
                placeholder="Plak hier je GLB-link"
              />
              <button id="loadModelBtn" class="secondary-btn">Laad link</button>
              <button id="arBtn" class="primary-btn">Bekijk in AR</button>
            </div>
          </div>

          <div id="app"></div>
        </section>
      </main>
    </div>

  </body>
</html>
